<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea Tracker — Unfinished Story</title>
<style>
:root{
  --bg:#faf9f7;--surface:#fff;--surface2:#f3f1ee;--surface3:#ece9e4;
  --border:#e4e0da;--border2:#ccc8c0;
  --text:#1a1714;--text2:#6b6560;--text3:#a09a93;
  --accent:#c4784a;--accent-bg:#fdf0e8;--accent-text:#7a3c18;
  --used-border:#4a7fc4;--unused-border:#5a9e6f;
  --shadow:0 2px 12px rgba(0,0,0,.08);
  --r:10px;--rs:6px;
}
.dark{
  --bg:#131210;--surface:#1e1c19;--surface2:#272420;--surface3:#302d29;
  --border:#3a3630;--border2:#4a4540;
  --text:#f0ece6;--text2:#a09a90;--text3:#6a6460;
  --accent:#e0946a;--accent-bg:#2e2018;--accent-text:#f0b888;
  --used-border:#5a8fd4;--unused-border:#6aae7f;
  --shadow:0 2px 12px rgba(0,0,0,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
button{font-family:inherit;cursor:pointer}
input,textarea,select{font-family:inherit}

/* ─ Layout ─ */
.app{display:flex;height:100vh;overflow:hidden;position:relative}
.sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s,transform .2s;z-index:10}
.sidebar.collapsed{width:0;border-right:none}
.sidebar-inner{width:240px;min-width:240px;display:flex;flex-direction:column;height:100%;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.content{flex:1;overflow-y:auto;padding:16px}

/* ─ Sidebar ─ */
.sidebar-head{padding:14px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-head h1{font-size:14px;font-weight:600;color:var(--text)}
.sidebar-head p{font-size:11px;color:var(--text3);margin-top:2px}
.sidebar-sec{padding:10px 10px 2px}
.sidebar-sec-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);padding:0 4px;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.sidebar-sec-lbl button{font-size:10px;color:var(--accent);background:none;border:none;cursor:pointer;padding:0}
.nav-btn{display:flex;align-items:center;gap:7px;width:100%;padding:6px 8px;border-radius:var(--rs);border:none;background:none;color:var(--text2);font-size:13px;cursor:pointer;text-align:left;transition:background .12s}
.nav-btn:hover{background:var(--surface2)}
.nav-btn.active{background:var(--accent-bg);color:var(--accent);font-weight:500}
.nav-btn .ico{width:16px;text-align:center;font-size:13px}
.nav-btn .cnt{margin-left:auto;font-size:11px;background:var(--surface2);color:var(--text3);padding:1px 6px;border-radius:10px}
.nav-btn.active .cnt{background:var(--accent-bg);color:var(--accent)}
.cat-list{display:flex;flex-direction:column;gap:1px;padding:0 10px 6px}
.cat-btn{display:flex;align-items:center;gap:7px;width:100%;padding:5px 8px;border-radius:var(--rs);border:none;background:none;color:var(--text2);font-size:12px;cursor:pointer;text-align:left;transition:background .12s}
.cat-btn:hover{background:var(--surface2)}
.cat-btn.active{background:var(--surface3);color:var(--text);font-weight:500}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-btn .cnt{margin-left:auto;font-size:11px;color:var(--text3)}
.sidebar-bottom{padding:10px 12px 14px;margin-top:auto;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.sb-btn{padding:7px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;text-align:center;width:100%;transition:background .12s}
.sb-btn:hover{background:var(--surface2);color:var(--text)}
.sb-btn.accent{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}
.sb-btn.accent:hover{opacity:.9}
.sb-row{display:flex;gap:6px}
.sb-row .sb-btn{flex:1}

/* ─ Topbar ─ */
.toggle-sidebar-btn{background:none;border:1px solid var(--border);border-radius:var(--rs);padding:6px 10px;color:var(--text2);font-size:16px;line-height:1;flex-shrink:0}
.toggle-sidebar-btn:hover{background:var(--surface2)}
.search-box{flex:1;min-width:120px;display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:6px 11px}
.search-box input{border:none;background:none;color:var(--text);font-size:13px;flex:1;outline:none;min-width:0}
.search-box input::placeholder{color:var(--text3)}
.tb-btn{padding:6px 12px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;white-space:nowrap;transition:all .12s;flex-shrink:0}
.tb-btn:hover{background:var(--surface2);color:var(--text)}
.view-grp{display:flex;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;flex-shrink:0}
.vbtn{padding:5px 9px;border:none;background:none;color:var(--text3);cursor:pointer;font-size:14px;transition:background .12s}
.vbtn:hover{background:var(--surface2)}
.vbtn.active{background:var(--surface2);color:var(--text)}
.sort-sel{padding:5px 8px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text);font-size:12px;outline:none;flex-shrink:0}
.expand-all-btn{padding:6px 10px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:12px;cursor:pointer;flex-shrink:0}
.expand-all-btn:hover{background:var(--surface2)}

/* ─ Stats ─ */
.stats-strip{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:7px 14px;display:flex;gap:7px;align-items:baseline}
.stat-num{font-size:18px;font-weight:600}
.stat-lbl{font-size:11px;color:var(--text2)}

/* ─ Active filters ─ */
.active-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.af-lbl{font-size:11px;color:var(--text3)}
.af-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border2);background:var(--surface2);color:var(--text2)}
.af-chip button{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:0;line-height:1}

/* ─ Cards ─ */
.cards-grid{display:flex;flex-direction:column;gap:9px}
.idea-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);transition:box-shadow .15s,border-color .15s}
.idea-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.idea-card.used{border-left:3px solid var(--used-border)}
.idea-card.unused{border-left:3px solid var(--unused-border)}
.card-head{display:flex;align-items:flex-start;gap:8px;padding:12px 14px 8px;cursor:pointer}
.card-text{flex:1;font-size:13.5px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-word}
.card-text.clamped{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;white-space:normal}
.exp-btn{background:none;border:1px solid var(--border);border-radius:4px;color:var(--text3);font-size:11px;padding:2px 6px;flex-shrink:0;margin-top:2px;transition:background .12s}
.exp-btn:hover{background:var(--surface2)}
.card-foot{padding:6px 14px 10px;display:flex;gap:5px;align-items:center;flex-wrap:wrap;border-top:1px solid var(--border)}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:2px 9px;border-radius:20px;white-space:nowrap;user-select:none}
.badge .bx{cursor:pointer;opacity:.6;font-size:12px;line-height:1}
.badge .bx:hover{opacity:1}
.add-tag-btn{font-size:11px;padding:2px 9px;border-radius:20px;border:1px dashed var(--border2);background:none;color:var(--text3);cursor:pointer;transition:all .12s}
.add-tag-btn:hover{color:var(--text2);border-color:var(--border2);background:var(--surface2)}
.card-actions{margin-left:auto;display:flex;gap:5px}
.act-btn{font-size:11px;padding:2px 9px;border-radius:20px;border:1px solid var(--border);background:none;color:var(--text3);cursor:pointer;transition:all .12s}
.act-btn:hover{background:var(--surface2);color:var(--text2)}

/* ─ Table ─ */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--text2)}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer}
tbody tr:hover{background:var(--surface2)}
tbody td{padding:9px 12px;vertical-align:top}
.td-text{max-width:400px}
.td-text p{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.5}

/* ─ Kanban ─ */
.kanban-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;align-items:flex-start}
.k-col{min-width:200px;width:210px;flex-shrink:0}
.k-col-head{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:8px;padding:0 2px;display:flex;justify-content:space-between}
.k-col-head .kc{font-size:11px;font-weight:400;color:var(--text3)}
.k-cards{display:flex;flex-direction:column;gap:7px}
.k-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rs);padding:9px 11px;font-size:12px;line-height:1.55;color:var(--text);cursor:pointer;transition:box-shadow .12s;overflow:hidden;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical}
.k-card:hover{box-shadow:var(--shadow)}
.k-card.used{border-left:3px solid var(--used-border)}
.k-card-tags{margin-top:5px;display:flex;gap:3px;flex-wrap:wrap;-webkit-line-clamp:unset;display:flex}

/* ─ Dropdown portal ─ */
#drop-portal{position:fixed;z-index:9999;background:var(--surface);border:1px solid var(--border2);border-radius:var(--rs);padding:4px;min-width:190px;box-shadow:0 6px 20px rgba(0,0,0,.18);display:none;max-height:300px;overflow-y:auto}
.drop-item{padding:6px 10px;border-radius:4px;font-size:12.5px;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:8px}
.drop-item:hover{background:var(--surface2)}
.drop-item.disabled{opacity:.35;pointer-events:none}
.drop-sep{height:1px;background:var(--border);margin:3px 0}
.drop-new-input{padding:5px 10px;display:flex;gap:6px;align-items:center}
.drop-new-input input{flex:1;padding:4px 7px;border:1px solid var(--border);border-radius:4px;background:var(--surface2);color:var(--text);font-size:12px;outline:none}
.drop-new-input button{padding:4px 8px;border-radius:4px;border:none;background:var(--accent);color:#fff;font-size:11px}

/* ─ Modal ─ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.modal-head{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-head h2{font-size:15px;font-weight:600}
.modal-x{background:none;border:none;color:var(--text3);font-size:22px;cursor:pointer;padding:0;line-height:1}
.modal-body{padding:18px 22px}
.modal-foot{padding:12px 22px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.fgrp{margin-bottom:14px}
.flbl{font-size:12px;font-weight:500;color:var(--text2);display:block;margin-bottom:6px}
.ftextarea{width:100%;min-height:110px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-size:13.5px;line-height:1.7;resize:vertical;outline:none;transition:border-color .15s}
.ftextarea:focus{border-color:var(--accent)}
.finput{width:100%;padding:7px 12px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface2);color:var(--text);font-size:13px;outline:none;transition:border-color .15s}
.finput:focus{border-color:var(--accent)}
.datetime-row{display:flex;gap:8px;flex-wrap:wrap}
.datetime-row .finput{flex:1;min-width:140px}
input[type="date"]::-webkit-calendar-picker-indicator,
input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(0.5);cursor:pointer}
.dark input[type="date"]::-webkit-calendar-picker-indicator,
.dark input[type="time"]::-webkit-calendar-picker-indicator{filter:invert(0.7)}
.card-dt{font-size:11px;color:var(--text3);margin-left:auto;white-space:nowrap;align-self:center}
.tag-picker{display:flex;gap:6px;flex-wrap:wrap}
.tpc{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:2px solid transparent;transition:all .12s;opacity:.55}
.tpc:hover{opacity:.8}
.tpc.sel{opacity:1;border-color:currentColor !important}
.status-row{display:flex;gap:8px;flex-wrap:wrap}
.sopt{flex:1;min-width:100px;padding:8px 10px;border-radius:var(--rs);border:1.5px solid var(--border);background:none;color:var(--text2);font-size:13px;cursor:pointer;text-align:center;transition:all .12s}
.sopt:hover{border-color:var(--border2);background:var(--surface2)}
.sopt.sel{font-weight:500}
.modal-btn{padding:7px 18px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface);color:var(--text2);font-size:13px;cursor:pointer;transition:all .12s}
.modal-btn:hover{background:var(--surface2)}
.modal-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}
.modal-btn.primary:hover{opacity:.9}
.modal-btn.danger{background:#e55;color:#fff;border-color:#e55}
.modal-btn.danger:hover{opacity:.9}

/* ─ Tag/Status manager modal ─ */
.mgr-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.mgr-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--surface2);border-radius:var(--rs);font-size:13px}
.mgr-item .dot{flex-shrink:0}
.mgr-item-name{flex:1}
.mgr-item-cnt{font-size:11px;color:var(--text3);margin-left:auto}
.mgr-del{background:none;border:none;color:var(--text3);font-size:16px;cursor:pointer;padding:0 4px;line-height:1}
.mgr-del:hover{color:#e55}
.mgr-add-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.mgr-add-row input{flex:1;min-width:120px;padding:6px 10px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);color:var(--text);font-size:13px;outline:none}
.mgr-add-row input:focus{border-color:var(--accent)}
.color-pick{display:flex;gap:6px;flex-wrap:wrap}
.cpick{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .12s}
.cpick.sel{border-color:var(--text)}

/* ─ Empty ─ */
.empty{text-align:center;padding:50px 20px;color:var(--text3);font-size:14px}
.empty-ico{font-size:36px;margin-bottom:10px}

/* ─ Scrollbar ─ */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ─ Mobile overlay ─ */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9}
@media(max-width:640px){
  body{overflow:auto}
  .app{flex-direction:column;height:auto;overflow:auto}
  .sidebar{position:fixed;top:0;left:0;height:100%;z-index:10;transform:translateX(-100%);width:260px!important;transition:transform .2s}
  .sidebar.mobile-open{transform:translateX(0)}
  .sidebar-overlay{display:block}
  .sidebar.collapsed{transform:translateX(-100%)}
  .main{min-height:100vh}
  .content{overflow-y:visible}
  .body{overflow:visible}
  .topbar{position:sticky;top:0;z-index:8}
  .kanban-wrap{flex-direction:column}
  .k-col{width:100%;min-width:0}
  table{font-size:12px}
}
</style>
</head>
<body>

<div class="app" id="app">

<!-- Sidebar overlay for mobile -->
<div class="sidebar-overlay" id="sb-overlay" style="display:none" onclick="closeMobileSidebar()"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
<div class="sidebar-inner">
  <div class="sidebar-head">
    <h1>📖 Idea Tracker</h1>
    <p>Unfinished Story</p>
  </div>

  <div class="sidebar-sec">
    <div class="sidebar-sec-lbl">Views</div>
    <div style="display:flex;flex-direction:column;gap:1px">
      <button class="nav-btn active" id="nav-all" onclick="setNav('all')"><span class="ico">📋</span>All Ideas<span class="cnt" id="cnt-all">0</span></button>
      <button class="nav-btn" id="nav-used" onclick="setNav('used')"><span class="ico">✅</span>Used in book<span class="cnt" id="cnt-used">0</span></button>
      <button class="nav-btn" id="nav-unused" onclick="setNav('unused')"><span class="ico">💡</span>Not yet used<span class="cnt" id="cnt-unused">0</span></button>
    </div>
  </div>

  <div class="sidebar-sec" style="margin-top:4px">
    <div class="sidebar-sec-lbl">By Category <button onclick="openMgr('tag')">Manage</button></div>
  </div>
  <div class="cat-list" id="cat-list"></div>

  <div class="sidebar-sec" style="margin-top:4px">
    <div class="sidebar-sec-lbl">By Status <button onclick="openMgr('status')">Manage</button></div>
  </div>
  <div class="cat-list" id="status-list"></div>

  <div class="sidebar-bottom">
    <button class="sb-btn accent" onclick="openAdd()">+ Add Idea</button>
    <div class="sb-row">
      <button class="sb-btn" onclick="exportData()">Export JSON</button>
      <label class="sb-btn" style="cursor:pointer">Import<input type="file" accept=".json" style="display:none" onchange="importData(event)"></label>
    </div>
    <button class="sb-btn" onclick="toggleDark()">Toggle dark mode</button>
  </div>
</div>
</div>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <button class="toggle-sidebar-btn" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
    <div class="search-box">
      <span style="color:var(--text3);font-size:13px">🔍</span>
      <input type="text" id="search" placeholder="Search ideas… (Ctrl+K)" oninput="render()">
    </div>
    <select class="sort-sel" id="sort-sel" onchange="render()">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
      <option value="used-first">Used first</option>
      <option value="unused-first">Unused first</option>
    </select>
    <button class="expand-all-btn" id="exp-all-btn" onclick="toggleExpandAll()">Expand all</button>
    <div class="view-grp">
      <button class="vbtn active" id="vb-cards" title="Cards" onclick="setView('cards')">≡</button>
      <button class="vbtn" id="vb-table" title="Table" onclick="setView('table')">⊞</button>
      <button class="vbtn" id="vb-kanban" title="Kanban" onclick="setView('kanban')">⬛</button>
    </div>
  </div>

  <div class="content">
    <div class="stats-strip" id="stats-strip"></div>
    <div class="active-filters" id="active-filters"></div>
    <div id="main-area"></div>
  </div>
</div>
</div>

<!-- Tag dropdown portal -->
<div id="drop-portal"></div>

<!-- Idea modal -->
<div class="modal-overlay" id="idea-modal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modal-title">Add Idea</h2>
      <button class="modal-x" onclick="closeModal('idea-modal')">×</button>
    </div>
    <div class="modal-body">
      <div class="fgrp">
        <label class="flbl">Idea / text (full, uncompressed)</label>
        <textarea class="ftextarea" id="m-text" rows="6" placeholder="Paste or write the full idea here…"></textarea>
      </div>
      <div class="fgrp">
        <label class="flbl">Date &amp; time</label>
        <div class="datetime-row">
          <input class="finput" type="date" id="m-date">
          <input class="finput" type="time" id="m-time" step="1">
        </div>
      </div>
      <div class="fgrp">
        <label class="flbl">Chapter / note (optional)</label>
        <input class="finput" id="m-chapter" placeholder="e.g. Ch 3, or 'for the ending'">
      </div>
      <div class="fgrp">
        <label class="flbl">Tags <span style="font-size:11px;color:var(--text3)">(click to toggle — must keep at least one)</span></label>
        <div class="tag-picker" id="m-tags"></div>
      </div>
      <div class="fgrp">
        <label class="flbl">Status</label>
        <div class="status-row" id="m-statuses"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="modal-btn danger" id="m-delete-btn" onclick="deleteIdea()" style="display:none;margin-right:auto">Delete idea</button>
